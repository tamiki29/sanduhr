<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d2b1d">
<title>Sanduhr · Rommé-Timer</title>
<style>
  :root{
    --felt-1:#1a4a30; --felt-2:#0b2417;
    --brass:#d8b263; --brass-dim:#9a7c3f;
    --sand:#e8b04b;
    --ink:#f3ead6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:Georgia,'Times New Roman',serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% 20%, var(--felt-1) 0%, var(--felt-2) 78%);
    overflow:hidden;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;
  }
  /* subtle felt weave */
  body::before{content:'';position:fixed;inset:0;pointer-events:none;opacity:.5;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(0,0,0,.03) 0 1px, transparent 1px 3px);}
  #app{
    height:100svh;display:flex;flex-direction:column;align-items:center;
    justify-content:space-between;padding:max(10px, env(safe-area-inset-top)) 14px max(12px, env(safe-area-inset-bottom));
  }
  header{text-align:center;letter-spacing:.42em;font-size:13px;color:var(--brass);
    text-transform:uppercase;padding:6px 0 2px;transition:transform .5s}
  header small{display:block;letter-spacing:.18em;font-size:10px;color:var(--brass-dim);margin-top:4px}
  #glassWrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;
    transition:filter .6s}
  #stage{transition:transform .8s cubic-bezier(.55,-0.15,.35,1.15)}
  #stage.turning{transform:rotate(180deg)}
  canvas{display:block;height:min(64svh,560px);width:auto;max-width:92vw;image-rendering:pixelated}
  body.done #glassWrap{filter:drop-shadow(0 0 26px rgba(232,176,75,.55))}
  #time{font-variant-numeric:tabular-nums;font-size:clamp(30px,7vw,40px);color:var(--brass);
    letter-spacing:.08em;text-align:center;transition:transform .5s;line-height:1.1;min-height:1.2em}
  body.done #time{animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .controls{display:flex;gap:10px;justify-content:center;padding:8px 0 2px;transition:transform .5s}
  button{
    font:inherit;font-size:14px;letter-spacing:.06em;color:var(--ink);
    background:linear-gradient(180deg,#3a2a18,#241708);
    border:1px solid var(--brass-dim);border-radius:999px;padding:10px 20px;
    box-shadow:0 2px 6px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08);
    cursor:pointer}
  button:active{transform:translateY(1px)}
  #hint{font-size:12px;color:rgba(243,234,214,.55);text-align:center;font-style:italic;
    padding-bottom:2px;transition:transform .5s;max-width:34ch;line-height:1.45}
  /* readable text when the phone is physically upside down */
  body.upside header, body.upside #time, body.upside .controls, body.upside #hint{transform:rotate(180deg)}
  #overlay{position:fixed;inset:0;background:rgba(8,20,13,.86);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:10;cursor:pointer}
  #overlay .inner{text-align:center;color:var(--ink)}
  #overlay .glyph{font-size:64px;line-height:1;filter:drop-shadow(0 4px 14px rgba(232,176,75,.35))}
  #overlay h1{font-size:20px;letter-spacing:.3em;color:var(--brass);margin:18px 0 8px;text-transform:uppercase}
  #overlay p{font-size:13px;color:rgba(243,234,214,.65);font-style:italic}
  @media (prefers-reduced-motion: reduce){
    #stage{transition:none} body.done #time{animation:none}
  }
</style>
</head>
<body>
<div id="app">
  <header>Sanduhr<small>Rommé · 2 Minuten</small></header>
  <div id="glassWrap"><div id="stage"><canvas id="cv"></canvas></div></div>
  <div id="time">2:00</div>
  <div class="controls">
    <button id="flipBtn">⟳ &nbsp;Umdrehen</button>
  </div>
  <div id="hint">Tippe auf die Sanduhr oder drehe das Handy auf den Kopf, um sie zu wenden.</div>
</div>
<div id="overlay">
  <div class="inner">
    <div class="glyph">⌛</div>
    <h1>Tippen zum Start</h1>
    <p>aktiviert Klang &amp; Bewegungssensor</p>
  </div>
</div>

<script>
'use strict';
/* ---------- simulation constants (verified: ~121 s run, no neck clog) ---------- */
const GW=84, GH=132, CELL=4, yTop=10, yBot=121, MIDB=66, MAXHW=33, NECKHW=1.6,
      FILL=0.70, DURATION=120, SPS=120;               // 120 physics substeps / second
const cx=(GW-1)/2;

function hwAt(y){
  const t=Math.min(1, Math.abs(y-65.5)/(65.5-yTop));
  return NECKHW+(MAXHW-NECKHW)*Math.sin(t*Math.PI*0.55)/Math.sin(Math.PI*0.55);
}
const mask=new Uint8Array(GW*GH), sand=new Uint8Array(GW*GH);
for(let y=yTop;y<=yBot;y++){const h=hwAt(y);for(let x=0;x<GW;x++)if(Math.abs(x-cx)<h)mask[y*GW+x]=1;}

let totalGrains=0, countTop=0, countBot=0;
(function fillTop(){
  let cap=0;for(let y=yTop;y<MIDB;y++)for(let x=0;x<GW;x++)if(mask[y*GW+x])cap++;
  const budget=Math.floor(cap*FILL);
  outer: for(let y=MIDB-1;y>=yTop;y--)for(let x=0;x<GW;x++){
    const i=y*GW+x;
    if(mask[i]){sand[i]=2+((Math.random()*4)|0);totalGrains++;countTop++;if(totalGrains>=budget)break outer;}
  }
})();
const ratePerSec=totalGrains/DURATION, ratePerStep=ratePerSec/SPS;

/* ---------- state ---------- */
let acc=0, gravityDown=true, tilt=0, scanLR=true,
    settle=0, armed=true, running=false, turning=false, sensorActive=false,
    gyF=1, gxF=0;

function crossesMid(y,ny){return (y<MIDB)!==(ny<MIDB);}
function isEmpty(x,y){const i=y*GW+x;return mask[i]===1&&sand[i]===0;}

function step(){
  acc=Math.min(acc+ratePerStep,4);
  const dir=gravityDown?1:-1;
  let moved=0;
  const y0=dir===1?yBot:yTop, y1=dir===1?yTop:yBot;
  for(let y=y0;dir===1?y>=y1:y<=y1;y-=dir){
    const row=y*GW;
    for(let k=0;k<GW;k++){
      const x=scanLR?k:GW-1-k, i=row+x, v=sand[i];
      if(!v)continue;
      const ny=y+dir; if(ny<yTop||ny>yBot)continue;
      const pref=Math.random()<0.5+tilt*0.4?1:-1;
      let did=false;
      // fall straight, then diagonals
      for(const nx of [x, x+pref, x-pref]){
        if(nx<0||nx>=GW||!isEmpty(nx,ny))continue;
        const cr=crossesMid(y,ny);
        if(cr&&acc<1)continue;         // throttle at the neck -> total ≈ 2 min
        if(cr){acc-=1; if(dir===1){countTop--;countBot++;}else{countBot--;countTop++;}}
        sand[ny*GW+nx]=v;sand[i]=0;moved++;did=true;break;
      }
      // lateral relaxation -> flatter, natural sand piles
      if(!did&&Math.random()<0.3){
        for(const s of (pref===1?[1,-1]:[-1,1])){
          const nx=x+s;
          if(nx<0||nx>=GW||nx+s<0||nx+s>=GW)continue;
          if(isEmpty(nx,y)&&isEmpty(nx+s,ny)){sand[row+nx]=v;sand[i]=0;moved++;break;}
        }
      }
    }
  }
  scanLR=!scanLR;
  if(moved===0)settle++;else settle=0;
}

/* ---------- audio: synthesized bell chime ---------- */
let actx=null, master=null;
function initAudio(){
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
    master=actx.createGain();master.gain.value=0.6;master.connect(actx.destination);
    if(actx.state==='suspended')actx.resume();
  }catch(e){}
}
function bell(freq,t,dur,gain){
  const o=actx.createOscillator(),o2=actx.createOscillator(),
        g=actx.createGain(),g2=actx.createGain();
  o.type='sine';o.frequency.value=freq;
  o2.type='sine';o2.frequency.value=freq*2.76;      // inharmonic partial = bell timbre
  g.gain.setValueAtTime(gain,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  g2.gain.setValueAtTime(gain*0.22,t);
  g2.gain.exponentialRampToValueAtTime(0.0001,t+dur*0.45);
  o.connect(g).connect(master);o2.connect(g2).connect(master);
  o.start(t);o.stop(t+dur);o2.start(t);o2.stop(t+dur*0.5);
}
function chime(){
  if(!actx)return;
  if(actx.state==='suspended')actx.resume();
  const t0=actx.currentTime+0.03;
  bell(440,t0,2.6,0.20);
  [880,1108.7,1318.5].forEach((f,i)=>bell(f,t0+i*0.17,2.0,0.24));
  [880,1318.5].forEach((f,i)=>bell(f,t0+1.15+i*0.17,2.2,0.18)); // gentle echo
}

/* ---------- rendering ---------- */
const cvs=document.getElementById('cv');
const dpr=Math.min(window.devicePixelRatio||1,2);
cvs.width=GW*CELL*dpr; cvs.height=GH*CELL*dpr;
const ctx=cvs.getContext('2d');
ctx.scale(dpr,dpr);
const off=document.createElement('canvas');off.width=GW;off.height=GH;
const octx=off.getContext('2d');
const img=octx.createImageData(GW,GH), px=img.data;
const PAL={2:[232,176,75],3:[214,150,52],4:[243,198,104],5:[198,134,46]};

const glassPath=new Path2D();
(function buildGlass(){
  const P=(x,y)=>[(cx+x)*CELL+CELL/2,(y)*CELL+CELL/2];
  let first=true;
  for(let y=yTop;y<=yBot;y++){const[a,b]=P(-hwAt(y)-0.6,y);first?glassPath.moveTo(a,b):glassPath.lineTo(a,b);first=false;}
  for(let y=yBot;y>=yTop;y--){const[a,b]=P(hwAt(y)+0.6,y);glassPath.lineTo(a,b);}
  glassPath.closePath();
})();

function drawFrame(){
  const W=GW*CELL, capH=yTop*CELL-6, capW=(MAXHW+7)*2*CELL, capX=(W-capW)/2;
  const wood=(y0,h)=>{
    const g=ctx.createLinearGradient(0,y0,0,y0+h);
    g.addColorStop(0,'#7a5432');g.addColorStop(.45,'#54371d');g.addColorStop(1,'#2e1c0c');
    return g;
  };
  const cap=(y0)=>{
    ctx.fillStyle=wood(y0,capH);
    ctx.beginPath();ctx.roundRect(capX,y0,capW,capH,7);ctx.fill();
    ctx.strokeStyle='rgba(216,178,99,.55)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(capX+2,y0+2,capW-4,capH-4,5);ctx.stroke();
  };
  cap(3); cap(GH*CELL-capH-3);
  // side pillars
  const pW=9, pT=3+capH-2, pB=GH*CELL-capH-3+2;
  for(const pX of [capX+5, capX+capW-5-pW]){
    const g=ctx.createLinearGradient(pX,0,pX+pW,0);
    g.addColorStop(0,'#6b4a2b');g.addColorStop(.5,'#8a6238');g.addColorStop(1,'#3a250f');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.roundRect(pX,pT,pW,pB-pT,4);ctx.fill();
  }
}

function render(){
  ctx.clearRect(0,0,GW*CELL,GH*CELL);
  // glass interior
  const gi=ctx.createLinearGradient(0,yTop*CELL,0,yBot*CELL);
  gi.addColorStop(0,'rgba(180,220,235,.10)');
  gi.addColorStop(.5,'rgba(10,26,20,.55)');
  gi.addColorStop(1,'rgba(180,220,235,.08)');
  ctx.fillStyle='rgba(8,20,15,.5)';ctx.fill(glassPath);
  ctx.fillStyle=gi;ctx.fill(glassPath);
  // sand (pixel layer)
  for(let i=0,j=0;i<sand.length;i++,j+=4){
    const v=sand[i];
    if(v){const c=PAL[v];px[j]=c[0];px[j+1]=c[1];px[j+2]=c[2];px[j+3]=255;}
    else px[j+3]=0;
  }
  octx.putImageData(img,0,0);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(off,0,0,GW,GH,0,0,GW*CELL,GH*CELL);
  // glass outline + sheen
  ctx.strokeStyle='rgba(230,245,255,.4)';ctx.lineWidth=1.6;ctx.stroke(glassPath);
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo((cx-hwAt(yTop+8)*0.72)*CELL,(yTop+9)*CELL);
  ctx.quadraticCurveTo((cx-MAXHW*0.62)*CELL,(yTop+26)*CELL,(cx-hwAt(52)*0.8)*CELL,52*CELL);
  ctx.moveTo((cx-hwAt(80)*0.8)*CELL,80*CELL);
  ctx.quadraticCurveTo((cx-MAXHW*0.62)*CELL,(yBot-26)*CELL,(cx-hwAt(yBot-8)*0.72)*CELL,(yBot-9)*CELL);
  ctx.stroke();
  drawFrame();
}

/* ---------- completion / timer ---------- */
const timeEl=document.getElementById('time');
function sourceCount(){return gravityDown?countTop:countBot;}
function checkFinish(){
  const src=sourceCount();
  if(armed&&src===0&&settle>15){
    armed=false;
    document.body.classList.add('done');
    timeEl.textContent='Zeit um!';
    chime();
  }
  if(!armed&&src>ratePerSec*5){
    armed=true;
    document.body.classList.remove('done');
  }
}
let lastShown='';
function updateTimer(){
  if(!armed&&sourceCount()===0)return;
  const s=Math.max(0,Math.ceil(sourceCount()/ratePerSec));
  const txt=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  if(txt!==lastShown){timeEl.textContent=txt;lastShown=txt;}
}

/* ---------- flipping ---------- */
const stage=document.getElementById('stage');
function manualFlip(){
  if(turning||sensorActive)return;
  turning=true;
  stage.classList.add('turning');
  setTimeout(()=>{
    gravityDown=!gravityDown;settle=0;
    stage.style.transition='none';
    stage.classList.remove('turning');
    void stage.offsetWidth;              // reflow, then restore transition
    stage.style.transition='';
    turning=false;
  },820);
}
document.getElementById('flipBtn').addEventListener('click',manualFlip);
cvs.addEventListener('click',manualFlip);

/* ---------- device orientation: gravity follows the phone ---------- */
function onOrient(e){
  if(e.beta==null)return;
  if(!sensorActive){
    sensorActive=true;
    document.getElementById('flipBtn').style.display='none';
    document.getElementById('hint').textContent='Handy auf den Kopf drehen = Sanduhr wenden.';
  }
  const b=e.beta*Math.PI/180, g=e.gamma*Math.PI/180;
  const gy=Math.sin(b), gx=Math.sin(g)*Math.cos(b);   // gravity in screen coords
  gyF+=(gy-gyF)*0.15; gxF+=(gx-gxF)*0.15;
  if(gravityDown&&gyF<-0.35){gravityDown=false;settle=0;document.body.classList.add('upside');}
  else if(!gravityDown&&gyF>0.35){gravityDown=true;settle=0;document.body.classList.remove('upside');}
  tilt=Math.max(-1,Math.min(1,gxF*2.2));              // side-tilt makes the sand lean
}

/* ---------- main loop (fixed timestep, frame-rate independent) ---------- */
let last=0, carry=0;
function loop(t){
  requestAnimationFrame(loop);
  if(!running){last=t;render();return;}
  if(!last)last=t;
  carry+=Math.min((t-last)/1000,0.1); last=t;
  const dt=1/SPS;
  let n=0;
  while(carry>=dt&&n<8){if(!turning)step();carry-=dt;n++;}
  checkFinish();
  updateTimer();
  render();
}
requestAnimationFrame(loop);

/* ---------- start overlay: unlock audio + sensors + wake lock ---------- */
document.getElementById('overlay').addEventListener('click',async function(){
  initAudio();
  try{
    if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
      const p=await DeviceOrientationEvent.requestPermission();
      if(p==='granted')window.addEventListener('deviceorientation',onOrient);
    }else if('DeviceOrientationEvent' in window){
      window.addEventListener('deviceorientation',onOrient);
    }
  }catch(e){}
  try{await navigator.wakeLock.request('screen');}catch(e){}
  this.remove();
  running=true;
});
</script>
</body>
</html>
